name: farketmez_knk
description: "Ne yapalım? Farketmez. - Arkadaş grupları için akıllı mekan öneri uygulaması"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3

  # Google Maps & Location
  google_maps_flutter: ^2.9.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Google Sign In
  google_sign_in: ^6.2.1

  # HTTP
  http: ^1.2.2
  dio: ^5.7.0

  # UI & Design
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  smooth_page_indicator: ^1.2.0+3

  # Utils
  url_launcher: ^6.3.1
  intl: ^0.19.0
  uuid: ^4.5.1
  permission_handler: ^11.3.1
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.1.2

  # Notifications
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: 'assets/icon/app_icon.png'
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: '#FF4500'

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/icon/
